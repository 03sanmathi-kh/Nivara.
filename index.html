<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nivara Care</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Poppins', sans-serif; }
  </style>
</head>

<body class="bg-gray-100">

<!-- NAVBAR -->
<div class="bg-indigo-600 text-white p-4 flex justify-between items-center">
  <h1 class="text-xl font-bold">Nivara Care</h1>

  <div class="space-x-3">
    <button onclick="showPage('dashboard')" class="hover:underline">Dashboard</button>
    <button onclick="showPage('risk')" class="hover:underline">Risk</button>
    <button onclick="showPage('chat')" class="hover:underline">Chat</button>
    <button onclick="showPage('appointments')" class="hover:underline">Appointments</button>
    <button onclick="showPage('reports')" class="hover:underline">Reports</button>
  </div>
</div>

<!-- CONTENT -->
<div class="p-6">

  <!-- DASHBOARD -->
  <div id="dashboard" class="page">
    <h2 class="text-2xl font-bold mb-4">Dashboard</h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="bg-white p-4 rounded shadow">
        <h3 class="text-gray-500">Risk Level</h3>
        <p class="text-xl font-bold text-yellow-500">Medium</p>
      </div>

      <div class="bg-white p-4 rounded shadow">
        <h3 class="text-gray-500">Appointments</h3>
        <p class="text-xl font-bold">2</p>
      </div>

      <div class="bg-white p-4 rounded shadow">
        <h3 class="text-gray-500">Reports</h3>
        <p class="text-xl font-bold">3</p>
      </div>
    </div>
  </div>

  <!-- RISK -->
  <div id="risk" class="page hidden">
    <h2 class="text-2xl font-bold mb-4">Risk Screening</h2>

    <button onclick="calculateRisk()" 
      class="bg-indigo-600 text-white px-4 py-2 rounded">
      Check Risk
    </button>

    <p id="riskResult" class="mt-4 text-lg font-semibold"></p>
  </div>

  <!-- CHAT -->
  <div id="chat" class="page hidden">
    <h2 class="text-2xl font-bold mb-4">AI Assistant</h2>

    <div class="bg-white p-4 rounded shadow h-64 overflow-y-auto mb-4" id="chatBox"></div>

    <div class="flex">
      <input id="chatInput" class="flex-1 p-2 border rounded-l" placeholder="Ask something..." />
      <button onclick="sendMessage()" class="bg-indigo-600 text-white px-4 rounded-r">Send</button>
    </div>
  </div>

  <!-- APPOINTMENTS -->
  <div id="appointments" class="page hidden">
    <h2 class="text-2xl font-bold mb-4">Appointments</h2>

    <div class="bg-white p-4 rounded shadow">
      Dr. Sharma — Tomorrow 10 AM
    </div>
  </div>

  <!-- REPORTS -->
  <div id="reports" class="page hidden">
    <h2 class="text-2xl font-bold mb-4">Reports</h2>

    <input type="file" class="mb-2"/>
    <button class="bg-indigo-600 text-white px-4 py-2 rounded">Upload</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
